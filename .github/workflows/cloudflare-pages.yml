name: Deploy to Cloudflare Workers (Static Assets)

on:
  push:
    branches: [main]
  workflow_dispatch:

# CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID is registered via GitHub Secrets.
# vars.ENABLE_CLOUDFLARE_DEPLOY=true をセットするまでこのワークフローは実行されない。

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_CLOUDFLARE_DEPLOY == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Build static site
        run: python site/build_site.py

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: .
