  tagline: 1990年代からデジタル革命を牽引し続けるエンジニア・経営者
  description: 1990年代に製造業DXを牽引し、クライミング業界にIT革命をもたらした由井辰美氏の包括的経歴。製造コスト75%削減、40ジムへのシステム提供、AI/アプリ開発の実績を網羅。
  source_url: https://www.genspark.ai/api/code_sandbox_light/preview/598e1ca9-55a0-42ef-94b1-2c2072dee9f3
