intro: |
  1964年生まれ。10歳から登山を始め、製造業エンジニアとして1990年代に国内でいち早く
  MRPシステム・LANベース製造管理を導入。製造コスト75%削減の実績を持つDXの先駆者。
  50歳で独立後、クライミング業界にITイノベーションをもたらし、現在はAI活用による
  企業コンサル、アプリ開発、マーチャンダイジングまで手掛ける "登る投資家"。

timeline:
  - year: 1974年〜（10歳）
    role: 登山人生のスタート
    description: |
      ボーイスカウト入隊をきっかけに登山を始める。以来50年以上、山とクライミングを
      愛し続ける。30歳を過ぎてから岩登りに本格的に挑戦し、国内外のボルダリング
      エリア開拓に没頭。フクベ渓谷、豊田をはじめ、滋賀県内10箇所、東海地方4箇所の
      岩場を整備・開拓。
    metrics: []

  - year: 1990年代後半
    role: 日昇テクニカ — 製造業DX革命
    description: |
      金属機械加工エンジニアとして、日本の製造業で先駆的にMRPシステムと
      社内ポータルサイトを自社開発。受注から設計・加工・納品までの全工程を
      一元管理する統合システムを構築し、製造コストを従来比 **25%（75%削減）** に
      圧縮する驚異的な成果を達成。
    metrics:
      - MRPシステム導入
      - 社内ポータル自社開発
      - 75%コスト削減
      - 社内ベンチャー創設

  - year: 1995年〜2000年代
    role: エンテック代表取締役 — インハウス自立型システム確立
    description: |
      内部ベンチャーとしてエンテックを率い、LANを活用した製造管理ソフトウェアを
      開発・販売。製造業では画期的だった **「一人一台PC」体制** を実現し、
      データベースからNCコード生成、通信、経営戦略まで統合したインハウス
      自立型システムを1990年代に構築。プログラム言語から切削技術、マテリアル
      工学まで幅広いエンジニアリング知識を駆使。
    metrics:
      - LAN製造管理ソフト開発
      - 一人一台PC実現
      - NCコード自動生成
      - DB統合システム

  - year: 2000年代後半〜2014年
    role: 日昇テクニカ常務取締役 — 経営DX推進
    description: |
      経営幹部として全社のIT戦略を指揮。製造プロセスへのさらなるデジタル化を
      推進し、社内のデジタルトランスフォーメーションを牽引。新規事業・子会社
      統括も担当し、50歳で独立するまで製造業のイノベーションをリード。
    metrics:
      - 全社IT戦略統括
      - DX先駆者
      - 新規事業創出

  - year: 2013年8月
    role: グッぼる ボルダリングCafe創業
    description: |
      滋賀県彦根市に、ジム・ショップ・カフェが融合した国内初の複合型クライミング
      施設をオープン。自社開発の顧客管理ソフトと課題管理システム **「Climb」** を
      導入し、全課題データを蓄積・分析。このシステムを全国40ジムに提供し、
      クライミング業界のIT化を推進。
    metrics:
      - 年間2.5万人利用
      - システム40ジム提供
      - シューズ120モデル
      - マット60枚常時在庫

  - year: 2013年〜現在
    role: クライミング通販国内No.1 & V17クライマーサポート
    description: |
      クライミングシューズ約120モデル、クラッシュパッド60枚超を常時在庫し、
      LINE接客からEC、店頭試履き、ジム試登まで一気通貫でサポート。世界最難V17を
      登るトップクライマー（亀山凌平らが「No Kapote Only」を第2登）をスタッフとして
      擁し、プロフェッショナルな助言体制を確立。
    metrics:
      - 通販国内No.1規模
      - V17クライマー常駐
      - 一気通貫サポート

  - year: 2014年〜
    role: Notエステ — ビューティーテックDX
    description: |
      南彦根・木屋町にセルフ美容サロンを展開。IPL・SHR複合機、EMSナノペン、
      ハイドラフェイシャル7in1等10台を導入し、月額9,900円サブスクで利用し放題を
      実現。利用ログをアプリ連携し、**機器稼働率90%** まで向上させる独自の
      オペレーション構築。
    metrics:
      - 月額9,900円サブスク
      - 稼働率90%
      - アプリ連携
      - IoT最適化

  - year: 2019年〜
    role: プロギングジャパン副会長 & rasiku COO
    description: |
      一般社団法人プロギングジャパン副会長として、年間30回超の清掃ランイベントを
      プロデュース。スターバックス等と協業し、参加者延べ4,000人規模に成長。
      また、株式会社rasikuでCOOとして、看護師×AIチャットによる生活習慣・メンタル
      伴走支援サービスを展開。アプリ月間アクティブ1.2万人を達成。
    metrics:
      - 年間30回イベント
      - 延べ4,000人参加
      - 月間1.2万人アクティブ

  - year: 2020年〜現在
    role: クライミングコンサル & エンジェル投資家
    description: |
      クライミング施設14件の立ち上げを支援。事業再構築補助金・地方創生交付金の
      採択率85%を誇る。アウトドア／ウェルビーイング系スタートアップへ累計1.8億円
      出資し、業界の成長を牽引。
    metrics:
      - 開業支援14件
      - 補助金採択率85%
      - 累計1.8億円投資

  - year: 2024年〜現在
    role: AI時代のアプリケーション開発
    description: |
      AIを駆使した企業コンサル、ソフトウェア開発、製品開発、マーチャンダイジングを
      展開。GenSpark、Claude等の最新AIツールを活用し、実用的なビジネス
      アプリケーションを次々とリリース。製造業DXで培った知見を、現代のAI時代に
      応用している。
    metrics:
      - AI活用コンサル
      - 実用アプリ開発
      - マーチャンダイジング

