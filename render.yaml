services:
  - type: web
    name: ai-watch
    runtime: static
    region: singapore
    branch: main
    buildCommand: pip install -r requirements.txt && python site/build_site.py
    staticPublishPath: ./site/dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /
        destination: /index.html
